<!DOCTYPE html>
<html lang='en'>
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Food Gallery </title>   
        <link rel="icon" href="https://drive.google.com/uc?export=download&id=1GWwUPt_IpZ78VWaYVbbmRLdfkCz--QnV">
        <link rel="stylesheet" href="styleGallery.css" >
        <style>
          *{
    margin: 0;
    padding:0;
    box-sizing:border-box ;
    font-family: Arial, Helvetica, sans-serif;
    transition:all .2s cubic-bezier(.34, 1.12, .68, 1.31);
}
.gallery{
    min-height: 100vh;
    background: #eee;
     padding-bottom: 100px;
    }
    .gallery .controls{
        display: flex;
        justify-content: center;
        padding: 20px 0;
        flex-wrap: wrap; 
        list-style: none;
        align-content: center;
    }
     .gallery .controls .button{
        height: 40px;
        width: 140px;
        background: #fff;
        color: #666;
        border-radius: 3px;
        font-size: 20px;
        line-height:40px;
        cursor: pointer;
        font-variant: small-caps;
        margin: 20px;
        text-align: center;
        box-shadow: 0 3px 5px rgba(0, 0, 0, .34);
    } 
    .gallery .controls{
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
         padding: 20px 0;
         list-style: none;
    }
    .gallery .controls .button.active{ 
        background:coral;
        color:white;
    } 
.gallery .image-container{
   display: flex;
   align-items: center;
   justify-content: center;
    flex-wrap: wrap; 
     margin: 40px auto;  
}
 .gallery .image-container .card { 
    margin: 20px; 
    width: 350px;
    height: 240px; 
    cursor: pointer;
    overflow: hidden;
    border: 15px solid #fff;
    box-shadow:0 3px 5px rgba(0, 0, 0, .3);
}
 .gallery .image-container .card  img{ 
    height:100%;
    width: 100%;
    object-fit: cover; 
}
.gallery .image-container .card:hover img{
transform: scale(1.4);
}
.image-container img{
    transition: transform 2s; 
    cursor:all-scroll;
}
        </style>
      </head>
    <body>
        
    <div class="gallery">
     <ul class="controls">
     <li class="button active" data-filter="all" >All</li>
    <li class="button" data-filter="ice-cream">Ice-cream</li>
    <li class="button" data-filter="cake">Cake</li>
    <li class="button" data-filter="chocolate">Chocolate</li>
    <li class="button" data-filter="pizza">Pizza</li>
   
     </ul>
   
     <div class="image-container">
        <a href="image/icecream.jpg" class="card ice-cream" >  
           <img  src="image/icecream.jpg"  alt="..."> </a>

        <a href="image/icecream1.jpg" class="card ice-cream ">  
          <img src="image/icecream1.jpg"  alt="..."> </a> 


        <a href="image/icecream2.jpg" class="card ice-cream">
           <img  src="image/icecream2.jpg"  alt="..."> </a>

        <a href="image/icecream3.jpg" class="card ice-cream"> 
          <img  src="image/icecream3.jpg"  alt="..."></a>

        <a href="image/choco1.jpg"    class="card chocolate" >  
          <img  src="image/choco1.jpg"  alt="..."></a>

        <a href="image/choco1.jpg"   class="card chocolate"> 
          <img  src="image/choco1.jpg"  alt="..."> </a>

        <a href="image/choco2.jpg"   class="card chocolate"> 
          <img  src="image/choco2.jpg"  alt="..."> </a>

        <a href="image/pizza.jpg"    class="card pizza" >  
          <img  src="image/pizza.jpg"  alt="..."></a>

        <a href="image/pizza1.jpg"  class="card pizza" >  
          <img  src="image/pizza1.jpg"  alt="..."></a>

        <a href="image/pizza3.jpg"  class="card pizza" > 
           <img  src="image/pizza3.jpg" alt="..."></a>
        <a href="image/cake.jpg"    class="card cake" >  
            <img  src= "image/cake.jpg" alt="..."></a> 
        <a href="image/cake1.jpg"   class="card cake" >  
          <img  src="image/cake1.jpg"  alt="..."></a>
          <a href="image/cake2.jpg"   class="card cake" > 
            <img  src="image/cake2.jpg" alt="..."></a>
        <a href="image/cake3.jpg"   class="card cake" >  
          <img  src="image/cake3.jpg" alt="..."></a>
        <a href="image/cake4.jpg"  class="card cake" >  
          <img  src="image/cake4.jpg" alt="..."></a>
            </div></div>
             <!-- jquery cdn link  -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script> 
   
     <script>
        $(document).ready(function(){
           $(".button").click(function(){
             $(this).addClass("active").siblings().removeClass("active");
             
           var filter= $(this).attr('data-filter')
            if(filter == 'all'){
            $(".card").show(400);
           }else {
             $(".card").not('.'+filter).hide(200);
             $(".card").filter('.'+filter).show(400);
         
           } 
      });
    });
    </script>
    </body>
    </html>
